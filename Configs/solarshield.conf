# =================================================================
# SOLAR SHIELD R-TADS: MOSQUITTO BROKER CONFIGURATION
# =================================================================

# 1. Network Binding
# Bind explicitly to the LAN IP. This allows the ESP32 to connect 
# over Wi-Fi, but prevents binding to external/VPN interfaces.
listener 1883 X.X.X.X

# 2. Authentication
# Disable anonymous access and point to our hashed password file.
allow_anonymous false
password_file /etc/mosquitto/passwd

# 3. Granular Logging for SOC Visibility
# Direct logs to a dedicated file instead of just journald.
#log_dest file /var/log/mosquitto/mosquitto.log

# Specify exactly what to log. This captures connections, disconnections,
# errors, and warnings—perfect for SIEM ingestion.
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
